<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SafeWalk · 내 주변 안전지도</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#f0f4fa; --white:#ffffff; --navy:#1a2540; --blue:#2563eb;
  --cyan:#0891b2; --green:#059669; --orange:#ea580c; --pink:#db2777;
  --gray:#64748b; --gray2:#e2e8f0; --card:rgba(255,255,255,0.92);
  --route-red:#ef4444; --route-red-dark:#dc2626;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--navy);}

/* INTRO */
#intro{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#e8f0fe 0%,#f0f9ff 50%,#fef3c7 100%);transition:opacity .5s,transform .5s;}
#intro.out{opacity:0;transform:scale(1.05);pointer-events:none;}
.intro-content{display:flex;flex-direction:column;align-items:center;padding:0 28px;width:100%;max-width:420px;animation:fadeup .7s ease both;}
@keyframes fadeup{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.2);border-radius:100px;padding:5px 14px;font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.08em;margin-bottom:28px;}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.app-name{font-size:48px;font-weight:900;letter-spacing:-.03em;color:var(--navy);margin-bottom:6px;}
.app-name span{color:var(--blue);}
.app-sub{font-size:14px;color:var(--gray);margin-bottom:44px;}
.section-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--gray);text-transform:uppercase;margin-bottom:14px;align-self:flex-start;}
.age-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-bottom:24px;}
.age-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 8px;border-radius:18px;border:2px solid var(--gray2);background:var(--white);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.age-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1);}
.age-card.selected{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.15);}
.age-card.selected[data-group="child"]{border-color:var(--green);}
.age-card.selected[data-group="youth"]{border-color:var(--pink);}
.age-card.selected[data-group="elder"]{border-color:var(--orange);}
.age-icon{font-size:30px;}
.age-name{font-size:13px;font-weight:700;color:var(--navy);}
.age-desc{font-size:10px;color:var(--gray);text-align:center;line-height:1.4;}
.start-btn{width:100%;padding:16px;border-radius:14px;border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;opacity:.35;pointer-events:none;font-family:'Noto Sans KR',sans-serif;}
.start-btn.on{opacity:1;pointer-events:auto;}
.start-btn.on:hover{background:#1d4ed8;transform:translateY(-1px);}
.cpted-entry{width:100%;margin-top:12px;padding-top:14px;border-top:1px solid rgba(100,116,139,.18);}
.cpted-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 15px;border-radius:16px;border:1.5px solid rgba(180,83,9,.25);background:rgba(255,251,235,.82);cursor:pointer;font-family:'Noto Sans KR',sans-serif;box-shadow:0 4px 14px rgba(180,83,9,.08);touch-action:manipulation;transition:all .2s;}
.cpted-btn:active{transform:scale(.985);background:#fef3c7;}
.cpted-left{display:flex;align-items:center;gap:10px;text-align:left;}
.cpted-ico{width:36px;height:36px;border-radius:12px;background:#f59e0b1f;display:flex;align-items:center;justify-content:center;font-size:20px;}
.cpted-title{font-size:13px;font-weight:800;color:#92400e;line-height:1.2;}
.cpted-desc{font-size:10px;color:#92400e99;margin-top:3px;}
.cpted-arr{font-size:18px;color:#92400e;font-weight:900;}

/* MAP SCREEN */
#map-screen{position:fixed;inset:0;display:none;flex-direction:column;}
#map-screen.show{display:flex;}
#map{flex:1;width:100%;min-height:0;}

.topbar{position:absolute;top:0;left:0;right:0;z-index:9999;padding:12px 14px 0;display:flex;gap:8px;align-items:center;}
.icon-btn{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--gray2);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;font-size:17px;backdrop-filter:blur(10px);box-shadow:0 2px 8px rgba(0,0,0,.1);transition:background .2s;touch-action:manipulation;}
.icon-btn:active{background:#dbeafe;}
.topbar-info{flex:1;background:var(--card);border:1px solid var(--gray2);border-radius:13px;padding:8px 13px;backdrop-filter:blur(10px);box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;align-items:center;gap:8px;}
.group-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px;}
.group-tag.child{background:#d1fae5;color:#065f46;}
.group-tag.youth{background:#fce7f3;color:#9d174d;}
.group-tag.elder{background:#ffedd5;color:#9a3412;}
.group-tag.cpted{background:#fef3c7;color:#92400e;}
.topbar-loc{font-size:12px;color:var(--gray);}

/* BOTTOM SHEET */
#sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:800;
  background:#fff;
  border-radius:20px 20px 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,.12);
  transform:translateY(calc(100% - 56px));
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:none;
}
#sheet.show{display:block;}
#sheet.open{transform:translateY(0);}
.sheet-handle-wrap{
  display:flex;flex-direction:column;align-items:center;
  touch-action:none;
  padding:10px 0 8px;cursor:grab;user-select:none;
}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--gray2);margin-bottom:6px;}
.sheet-label{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:.08em;}
.sheet-body{padding:0 14px max(28px, env(safe-area-inset-bottom));touch-action:pan-y;max-height:62vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.chips{display:flex;flex-direction:column;gap:0;}

/* chip-row는 이제 <label> — 행 어디를 눌러도 안의 체크박스가 토글됨 (iOS Safari에서 가장 안정적) */
.chip-row{display:flex;align-items:center;justify-content:space-between;min-height:54px;padding:13px 0;border-bottom:1px solid var(--gray2);touch-action:manipulation;position:relative;cursor:pointer;}
.chip-row:last-child{border-bottom:none;}
.chip-row:active{background:rgba(37,99,235,.045);}
.chip-left{display:flex;align-items:center;gap:10px;pointer-events:none;}
.chip-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.chip-label{font-size:13px;font-weight:600;color:var(--navy);}
.chip-sub{font-size:11px;color:var(--gray);margin-top:1px;}

/* 시각 토글: 상태는 .chip-row.on 클래스로 표현.
   체크박스 합성클릭(label→input) 의존을 버리고 JS click 한 번으로 직접 토글하므로
   iOS Safari에서 가장 확실하게 동작함. 토글은 데이터 로딩과 완전히 분리되어 즉시 반응함. */
.sw-vis{position:relative;width:46px;height:28px;border-radius:14px;background:var(--gray2);flex-shrink:0;transition:background .2s;pointer-events:none;}
.sw-vis .toggle-thumb{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:transform .2s;}
.sw-vis .toggle-thumb .mini-spin{display:none;}
.chip-row.on .sw-vis{background:var(--blue);}
.chip-row.on .sw-vis .toggle-thumb{transform:translateX(18px);}
.chip-row:focus-visible{outline:none;}
.chip-row:focus-visible .sw-vis{outline:3px solid rgba(37,99,235,.4);outline-offset:2px;}
/* 데이터 로딩 중: 토글은 이미 ON으로 이동해 있고, 손잡이 안에서 스피너가 돎. */
.chip-row.loading .sw-vis .toggle-thumb .mini-spin{display:block;position:absolute;inset:4px;border:2px solid rgba(255,255,255,.55);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}

/* CCTV: 겉모양은 예전 긴 슬라이드(SLIDE→ON). 동작은 다른 토글과 동일한 탭. */
.chip-row[data-key="cctv"]{min-height:62px;padding:15px 0;}
.chip-row[data-key="cctv"] .sw-vis{width:124px;height:40px;border-radius:999px;background:#e2e8f0;border:1px solid rgba(100,116,139,.25);}
.chip-row[data-key="cctv"] .sw-vis .toggle-thumb{width:24px;height:24px;top:8px;left:8px;}
.chip-row[data-key="cctv"].on .sw-vis .toggle-thumb{transform:translateX(84px);}
.chip-row[data-key="cctv"] .sw-vis::after{content:'SLIDE';position:absolute;top:50%;right:14px;transform:translateY(-50%);font-size:10px;font-weight:800;letter-spacing:.08em;color:rgba(100,116,139,.56);pointer-events:none;}
.chip-row[data-key="cctv"].on .sw-vis{background:#dbeafe;border-color:rgba(37,99,235,.38);}
.chip-row[data-key="cctv"].on .sw-vis .toggle-thumb{background:var(--blue);}
.chip-row[data-key="cctv"].on .sw-vis::after{content:'ON';right:auto;left:16px;color:rgba(37,99,235,.48);}
.chip-row[data-key="cctv"].loading .sw-vis::after{content:'로딩중';right:auto;left:16px;color:rgba(37,99,235,.6);}
.chips,.chip-row{-webkit-user-select:none;user-select:none;}


.stats-bar{display:flex;gap:8px;overflow-x:auto;padding-top:10px;border-top:1px solid var(--gray2);scrollbar-width:none;}
.stats-bar::-webkit-scrollbar{display:none;}
.stat-item{flex-shrink:0;display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--gray2);border-radius:10px;padding:6px 10px;}
.stat-emoji{font-size:14px;}
.stat-info{display:flex;flex-direction:column;}
.stat-num{font-size:14px;font-weight:900;line-height:1;}
.stat-lbl{font-size:9px;color:var(--gray);font-weight:500;white-space:nowrap;}



/* ROUTE */
.route-panel{
  position:fixed;
  left:14px;
  right:14px;
  bottom:var(--route-panel-bottom,70px);
  z-index:850;
  display:none;
  background:rgba(255,255,255,.96);
  border:1px solid var(--gray2);
  border-radius:18px;
  box-shadow:0 8px 28px rgba(15,23,42,.18);
  backdrop-filter:blur(12px);
  padding:14px;
  transition:bottom .28s cubic-bezier(.4,0,.2,1);
  max-height:calc(100vh - 82px - var(--route-panel-bottom,70px));
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.route-panel.show{display:block;animation:routeIn .22s ease both;}
@keyframes routeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.route-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
.route-title{font-size:14px;font-weight:900;color:var(--navy);line-height:1.25;}
.route-sub{font-size:11px;color:var(--gray);margin-top:3px;line-height:1.35;}
.route-close{border:0;background:var(--bg);color:var(--gray);border-radius:10px;width:30px;height:30px;font-size:15px;font-weight:900;cursor:pointer;touch-action:manipulation;}
.route-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0;}
.route-metric{background:var(--bg);border:1px solid var(--gray2);border-radius:12px;padding:8px 9px;min-width:0;}
.route-metric .v{font-size:16px;font-weight:900;color:var(--route-red);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.route-metric .k{font-size:9px;color:var(--gray);font-weight:700;margin-top:3px;white-space:nowrap;}
.route-safe-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.route-pill{font-size:10px;font-weight:800;padding:5px 8px;border-radius:999px;background:#fff1f2;color:#be123c;border:1px solid #fecdd3;}
.route-reason{font-size:11px;color:var(--gray);line-height:1.45;margin-top:8px;padding-top:8px;border-top:1px solid var(--gray2);}
.route-toast{
  position:fixed;
  top:62px;
  left:14px;
  right:14px;
  z-index:10000;
  display:none;
  background:rgba(26,37,64,.92);
  color:#fff;
  border-radius:14px;
  padding:11px 13px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  font-size:12px;
  line-height:1.45;
}
.route-toast.show{display:block;animation:fadeup .18s ease both;}
.map-pick-mode .leaflet-container{cursor:crosshair;}
.waypoint-label{
  background:#fff;
  border:2px solid #059669;
  color:#065f46;
  border-radius:999px;
  padding:4px 8px;
  font-size:10px;
  font-weight:900;
  box-shadow:0 3px 10px rgba(0,0,0,.16);
  white-space:nowrap;
}

.cpted-target-label{
  background:#fff7ed;
  border:2px solid #b45309;
  color:#92400e;
  border-radius:999px;
  padding:5px 9px;
  font-size:10px;
  font-weight:900;
  box-shadow:0 3px 10px rgba(0,0,0,.16);
  white-space:nowrap;
}

/* POPUP */
.safepopup .leaflet-popup-content-wrapper{background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);color:var(--navy);}
.safepopup .leaflet-popup-content{margin:16px 18px 14px 16px;padding-right:26px;}
.safepopup .leaflet-popup-tip{background:#fff;}
/* 모바일에서 팝업 닫기 X를 누르다 지도 클릭으로 오인되는 문제 방지 */
.safepopup .leaflet-popup-close-button{
  width:38px !important;
  height:38px !important;
  top:4px !important;
  right:4px !important;
  display:flex !important;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  background:rgba(241,245,249,.96);
  color:#334155 !important;
  font-size:26px !important;
  line-height:38px !important;
  font-weight:900;
  text-decoration:none;
  z-index:10;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.safepopup .leaflet-popup-close-button:active{background:#e2e8f0;transform:scale(.96);}
.ptitle{font-size:14px;font-weight:700;margin-bottom:5px;padding-right:16px;}
.prow{font-size:12px;color:var(--gray);margin-top:3px;display:flex;align-items:center;gap:5px;}
.pbadge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;margin-bottom:7px;}

/* LOADING */
#loading{position:fixed;inset:0;z-index:2000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .4s;}
#loading.hide{opacity:0;pointer-events:none;}
.spin{width:44px;height:44px;border:3px solid var(--gray2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-size:13px;color:var(--gray);font-weight:500;}
#map-spinner{position:fixed;bottom:80px;right:14px;z-index:600;background:var(--card);border:1px solid var(--gray2);border-radius:50%;width:36px;height:36px;display:none;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.1);}
#map-spinner.show{display:flex;}
#map-spinner .mspin{width:18px;height:18px;border:2px solid var(--gray2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
.leaflet-container{touch-action:pan-x pan-y !important;}
/* 마커 이동/갱신 시 모바일 렌더링 안정화 */
.leaflet-marker-icon,.leaflet-marker-shadow{will-change:transform;backface-visibility:hidden;}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div class="load-txt" id="loadTxt">불러오는 중...</div>
</div>

<div id="intro">
  <div class="intro-content">
    <div class="badge"><span class="badge-dot"></span>생활안전지도 기반</div>
    <div style="font-size:10px;color:var(--gray);margin-top:-20px;margin-bottom:28px;letter-spacing:.05em;">v.1.5.1</div>
    <div class="app-name">Safe<span>Walk</span></div>
    <div class="app-sub">내 주변 안전 인프라, 미리 확인하세요</div>
    <div class="section-lbl">나는 누구인가요?</div>
    <div class="age-cards">
      <div class="age-card" data-group="child" onclick="pick(this)">
        <div class="age-icon">🧒</div>
        <div class="age-name">아동</div>
        <div class="age-desc">초등학생<br>이하</div>
      </div>
      <div class="age-card" data-group="youth" onclick="pick(this)">
        <div class="age-icon">🚶‍♀️</div>
        <div class="age-name">청소년</div>
        <div class="age-desc">중·고등<br>학생</div>
      </div>
      <div class="age-card" data-group="elder" onclick="pick(this)">
        <div class="age-icon">👴</div>
        <div class="age-name">노인</div>
        <div class="age-desc">65세<br>이상</div>
      </div>
    </div>
    <button class="start-btn" id="startBtn" onclick="start()">📍 내 주변 안전지도 보기</button>

    <div class="cpted-entry">
      <button type="button" class="cpted-btn" onclick="startCpted()">
        <div class="cpted-left">
          <div class="cpted-ico">🏗</div>
          <div>
            <div class="cpted-title">범죄예방환경설계 지도</div>
            <div class="cpted-desc">CPTED 구역만 따로 확인하기</div>
          </div>
        </div>
        <div class="cpted-arr">›</div>
      </button>
    </div>
  </div>
</div>

<div id="map-screen">
  <div id="map"></div>
  <div id="map-spinner"><div class="mspin"></div></div>
  <div class="topbar">
    <div class="icon-btn" onclick="goBack()">←</div>
    <div class="topbar-info">
      <span class="group-tag" id="gTag"></span>
      <span class="topbar-loc" id="locTxt">위치 확인 중...</span>
    </div>
    <div class="icon-btn" id="routeBtn" onclick="startRoutePick()" title="안전 길찾기">🧭</div>
    <div class="icon-btn" onclick="flyHome()">📍</div>
  </div>
</div>

<div id="sheet">
  <div class="sheet-handle-wrap" id="sheetHandle">
    <div class="sheet-handle"></div>
    <div class="sheet-label">레이어 설정</div>
  </div>
  <div class="sheet-body">
    <div class="chips" id="chips"></div>
    <div class="stats-bar" id="statsBar"></div>
  </div>
</div>

<div id="routePanel" class="route-panel">
  <div class="route-head">
    <div>
      <div class="route-title" id="routeTitle">🧭 안전 우선 경로</div>
      <div class="route-sub" id="routeSub">목적지를 선택하면 실제 도보 경로를 계산합니다.</div>
    </div>
    <button class="route-close" type="button" onclick="clearRoute()">×</button>
  </div>
  <div class="route-grid">
    <div class="route-metric"><div class="v" id="routeDistance">-</div><div class="k">거리</div></div>
    <div class="route-metric"><div class="v" id="routeDuration">-</div><div class="k">예상 시간</div></div>
    <div class="route-metric"><div class="v" id="routeScore">-</div><div class="k">안전도</div></div>
  </div>
  <div class="route-safe-list" id="routeSafeList"></div>
  <div class="route-reason" id="routeReason">치안시설·아동안전지킴이집 등 안전시설 접근성을 우선 반영합니다.</div>
</div>
<div id="routeToast" class="route-toast"></div>


<script>
/* ── Bottom Sheet ── */
let sheetInited = false;
let routePanelResizeBound = false;

function initSheet(){
  if(sheetInited) return;
  sheetInited = true;

  const sheet=document.getElementById('sheet');
  const handle=document.getElementById('sheetHandle');
  let startY=0, startT=0, isDragging=false;

  handle.addEventListener('touchstart',e=>{
    startY=e.touches[0].clientY;
    startT=Date.now();
    isDragging=true;
    sheet.style.transition='none';
  },{passive:true});

  handle.addEventListener('touchmove',e=>{
    if(!isDragging) return;
    const dy=e.touches[0].clientY-startY;
    const isOpen=sheet.classList.contains('open');
    const base=isOpen?0:sheet.offsetHeight-56;
    const newY=Math.max(0, Math.min(sheet.offsetHeight-56, base+dy));
    sheet.style.transform=`translateY(${newY}px)`;
    updateRoutePanelPosition(sheet.offsetHeight-newY);
  },{passive:true});

  handle.addEventListener('touchend',e=>{
    if(!isDragging) return;
    isDragging=false;
    sheet.style.transition='';
    const dy=e.changedTouches[0].clientY-startY;
    const dt=Date.now()-startT;
    const isOpen=sheet.classList.contains('open');

    if((!isOpen && (dy<-50||(dt<300&&dy<-20)))||(isOpen&&dy>50)) {
      sheet.classList.toggle('open');
    }
    sheet.style.transform='';
    requestAnimationFrame(()=>updateRoutePanelPosition());
  },{passive:true});

  handle.addEventListener('click',()=>{
    sheet.classList.toggle('open');
    sheet.style.transform='';
    requestAnimationFrame(()=>updateRoutePanelPosition());
  });

  if(!routePanelResizeBound){
    routePanelResizeBound=true;
    window.addEventListener('resize',()=>requestAnimationFrame(()=>updateRoutePanelPosition()));
    window.addEventListener('orientationchange',()=>setTimeout(()=>updateRoutePanelPosition(),250));
  }

  requestAnimationFrame(()=>updateRoutePanelPosition());
}

function getSheetVisibleHeight(){
  const sheet=document.getElementById('sheet');
  if(!sheet||!sheet.classList.contains('show')) return 0;

  const h=sheet.offsetHeight||0;
  if(!h) return 0;
  if(sheet.classList.contains('open')) return h;
  return Math.min(56,h);
}

function updateRoutePanelPosition(visibleHeightOverride){
  const panel=document.getElementById('routePanel');
  if(!panel) return;

  const baseBottom=70;

  if(!panel.classList.contains('show')){
    panel.style.setProperty('--route-panel-bottom',baseBottom+'px');
    return;
  }

  const visible=Number.isFinite(visibleHeightOverride)
    ? visibleHeightOverride
    : getSheetVisibleHeight();

  // 바텀시트가 접힌 상태에서는 기존 위치 유지, 열린 상태에서는 시트 높이만큼 위로 올림.
  let target=visible>70 ? visible+12 : baseBottom;

  // 너무 작은 화면에서는 상단바를 가리지 않도록 상승 높이를 제한함.
  const topSafe=76;
  const maxBottom=Math.max(baseBottom, window.innerHeight-panel.offsetHeight-topSafe);
  target=Math.max(baseBottom,Math.min(target,maxBottom));

  panel.style.setProperty('--route-panel-bottom',Math.round(target)+'px');
}

function updateRouteButtonVisibility(){

/* 모바일 Safari 안정형 토글 처리 (v1.5.1)
   - label→checkbox 암묵 토글에 의존하지 않고, div + JS click 한 번으로 직접 상태를 뒤집음.
     (아이폰 사파리에서 합성 클릭이 안 먹는 경우를 원천 차단)
   - 토글 슬라이드는 즉시 이동하고, 데이터 로딩은 setXmlLayerVisible 안에서 별도로 돌며 손잡이 스피너로 표시됨.
   - WMS는 display:none이 아니라 Leaflet addLayer/removeLayer로 제어함. */
function bindChipToggleEvents(){
  const c=document.getElementById('chips');
  if(!c||chipToggleEventsBound) return;
  chipToggleEventsBound=true;

  // 상태 변경의 단일 진입점. 클릭/키보드가 모두 여기로 모임.
  function flipRow(row){
    if(!row) return;
    const kind=row.dataset.kind;
    const key=row.dataset.key;
    const on=!row.classList.contains('on');

    // 1) 토글 UI는 데이터와 무관하게 '즉시' 반영(슬라이드 이동).
    row.classList.toggle('on',on);
    row.setAttribute('aria-checked',on?'true':'false');
    console.log('[toggle]',kind,key,on?'ON':'OFF');

    // 2) 레이어/데이터 처리는 그 다음.
    if(kind==='xml'){
      // CCTV는 마커가 많아 add/removeLayer가 잠깐 메인 스레드를 막을 수 있으니 다음 프레임으로 넘김.
      if(key==='cctv'){
        chipOn[key]=on;
        requestAnimationFrame(()=>setXmlLayerVisible(key,on));
      }else{
        setXmlLayerVisible(key,on);
      }
    }else if(kind==='wms'){
      setWmsLayerVisible(key,on);
    }
  }

  // iOS Safari에서 가장 확실한 단일 click. touch-action:manipulation이라 300ms 지연·더블탭줌 없음.
  // 스크롤 중에는 click이 발생하지 않으므로 시트 스크롤과 충돌하지 않음.
  c.addEventListener('click',e=>{
    const row=e.target.closest('.chip-row');
    if(row&&c.contains(row)) flipRow(row);
  });

  // 키보드 접근성(스페이스/엔터)
  c.addEventListener('keydown',e=>{
    if(e.key!==' '&&e.key!=='Enter') return;
    const row=e.target.closest('.chip-row');
    if(!row||!c.contains(row)) return;
    e.preventDefault();
    flipRow(row);
  });
}

/* 토글 손잡이 안 스피너 on/off — 데이터 로딩 중임을 토글 안에서 직접 표시함. */
function setRowLoading(key,loading){
  const row=document.querySelector('.chip-row[data-kind="xml"][data-key="'+key+'"]');
  if(row) row.classList.toggle('loading',loading);
}

function setXmlLayerVisible(key,on){
  chipOn[key]=on;
  ensureMarkerLayer(key);

  if(on){
    if(map && layers[key] && !map.hasLayer(layers[key])) layers[key].addTo(map);

    // 캐시가 없거나 현재 화면을 커버하지 못할 때만 새로 조회함.
    if(!isMarkerLayerCacheFresh(key,map.getBounds())){
      setRowLoading(key,true);   // 토글은 이미 ON, 데이터는 뒤에서 로딩(손잡이 스피너 표시)
      fetchLayer(key,null,true).then(()=>{
        refreshCachedFacilityState();
        updateStats();
      }).finally(()=>{
        setRowLoading(key,false);
      });
    }
  }else{
    setRowLoading(key,false);
    if(layers[key]&&map&&map.hasLayer(layers[key])) map.removeLayer(layers[key]);
  }

  refreshCachedFacilityState();
  updateStats();
}

function setWmsLayerVisible(key,on){
  chipOn['w_'+key]=on;
  const layer=wmsTiles[key];
  if(!layer||!map) return;

  if(on){
    layer.setOpacity(0.5);
    if(!map.hasLayer(layer)) layer.addTo(map);
  }else{
    if(map.hasLayer(layer)) map.removeLayer(layer);
    if(key==='cpted'){
      cptedTapRequestToken++;
      clearCptedGuide(true);
    }
  }
}

function clearCptedGuide(closePopup=true){

  cptedGuideLine=null;
  cptedTargetMark=null;
  cptedTapMark=null;
  if(closePopup&&map) map.closePopup();
}

function markPopupCloseTouch(e){
  lastPopupCloseAt=Date.now();
  if(e){
    e.stopPropagation();
    if(e.stopImmediatePropagation) e.stopImmediatePropagation();
  }

function bindPopupCloseGuard(){
  if(!map||map._popupCloseGuardBound) return;
  map._popupCloseGuardBound=true;

  map.on('popupopen',e=>{
    const popupEl=e.popup&&e.popup.getElement?e.popup.getElement():null;
    if(!popupEl) return;
    const closeBtn=popupEl.querySelector('.leaflet-popup-close-button');
    if(!closeBtn||closeBtn._safeWalkCloseGuard) return;
    closeBtn._safeWalkCloseGuard=true;

    ['pointerdown','touchstart','mousedown'].forEach(type=>{
      closeBtn.addEventListener(type,markPopupCloseTouch,{capture:true,passive:true});
    });

    closeBtn.addEventListener('click',ev=>{
      ev.preventDefault();
      markPopupCloseTouch(ev);
      if(map) map.closePopup();
    },{capture:true});
  });
}

/* ── GPS ── */
function getGPS(){
  if(!navigator.geolocation){
    useDefault();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    p=>{
      myLat=p.coords.latitude;
      myLng=p.coords.longitude;
      onLocated();
    },
    ()=>useDefault(),
    {timeout:7000,enableHighAccuracy:true}
  );

  watchId=navigator.geolocation.watchPosition(
    p=>{
      myLat=p.coords.latitude;
      myLng=p.coords.longitude;
      drawMe();
    },
    ()=>{},
    {enableHighAccuracy:true,maximumAge:3000}
  );
}

function useDefault(){
  myLat=36.0190;
  myLng=129.3435;
  onLocated();
}

function onLocated(){
  map.setView([myLat,myLng],15);
  drawMe();
  revGeo();
  addWMS();
  fetchAll();

  let moveTimer=null;
  map.on('moveend',()=>{
    clearTimeout(moveTimer);
    moveTimer=setTimeout(()=>fetchAll(true),MARKER_MOVE_DEBOUNCE_MS);
  });

  async function handleCptedTap(latlng){
    const now=Date.now();
    if(now-lastPopupCloseAt<520) return;
    if(now-lastCptedDirectTapAt<320) return;
    lastCptedDirectTapAt=now;

    // 지도를 다시 찍으면 기존 CPTED 팝업·직선·표식을 먼저 정리함.
    clearCptedGuide(true);

    if(!chipOn['w_cpted']||!wmsTiles['cpted']) return;

    const spinner=document.getElementById('map-spinner');
    if(spinner) spinner.classList.add('show');

    const requestToken=++cptedTapRequestToken;

    // CPTED는 점 마커가 아니라 구역형 WMS라서, 화면 범위 안의 대표 좌표 목록을 가져온 뒤
    // 사용자가 찍은 좌표와 가장 가까운 대표 좌표를 계산해 직선으로 연결함.
    const b=map.getBounds().pad(0.35);
    const nw=L.CRS.EPSG3857.project(b.getNorthWest());
    const se=L.CRS.EPSG3857.project(b.getSouthEast());

    const params=new URLSearchParams({
      top:nw.y,
      bottom:se.y,
      left:nw.x,
      right:se.x,
      layer:'A2SM_CPTED_G',
      style:'A2SM_CPTED_G',
      currentPage:'1',
      perPage:'300'
    });

    try{
      const res=await fetch('https://www.safemap.go.kr/com/cmm/getMapLayerListPost.json',{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:params
      });

      const data=await res.json();
      if(requestToken!==cptedTapRequestToken) return;

      const items=(data.layerList||[]).filter(it=>it.x&&it.y);

      if(items.length===0){
        L.popup({className:'safepopup',closeButton:true,maxWidth:260,closeOnClick:true})
          .setLatLng(latlng)
          .setContent(`
            <div class="pbadge" style="background:#b4530918;color:#b45309">🏗 범죄예방환경설계</div>
            <div class="ptitle">조회 가능한 CPTED 정보 없음</div>
            <div class="prow">현재 화면 주변에서 CPTED 상세 정보를 찾지 못했습니다.</div>
          `).openOn(map);
        return;
      }

      let closest=null;
      let closestLatLng=null;
      let minDist=Infinity;

      items.forEach(it=>{
        const x=parseFloat(it.x);
        const y=parseFloat(it.y);
        if(isNaN(x)||isNaN(y)) return;

        const p=L.CRS.EPSG3857.unproject(L.point(x,y));
        const d=distM(latlng.lat,latlng.lng,p.lat,p.lng);

        if(d<minDist){
          minDist=d;
          closest=it;
          closestLatLng=p;
        }
      });

      if(!closest||!closestLatLng){
        L.popup({className:'safepopup',closeButton:true,maxWidth:260,closeOnClick:true})
          .setLatLng(latlng)
          .setContent(`
            <div class="pbadge" style="background:#b4530918;color:#b45309">🏗 범죄예방환경설계</div>
            <div class="ptitle">CPTED 정보 확인 불가</div>
            <div class="prow">가장 가까운 구역 정보를 계산하지 못했습니다.</div>
          `).openOn(map);
        return;
      }

      drawCptedGuide(latlng,closestLatLng);

      const addr=closest.adres||closest.roadnm_add||closest.jibun_addr||'';
      const district=closest.jurisd_inst_nm||closest.jp_nm||'';
      const distText=minDist<1000?`${Math.round(minDist)}m`:`${(minDist/1000).toFixed(1)}km`;

      L.popup({className:'safepopup',closeButton:true,maxWidth:285,closeOnClick:true})
        .setLatLng(latlng)
        .setContent(`
          <div class="pbadge" style="background:#b4530918;color:#b45309">🏗 범죄예방환경설계</div>
          <div class="ptitle">가장 가까운 CPTED 구역</div>
          ${addr?`<div class="prow">📍 ${addr}</div>`:''}
          ${district?`<div class="prow">🏢 ${district}</div>`:''}
          <div class="prow" style="color:#b45309">선택 지점에서 직선거리 약 ${distText}</div>
          <div class="prow">지도에 점선으로 선택 지점과 CPTED 대표 좌표를 연결했습니다.</div>
          ${closest.totcnt?`<div class="prow">현재 화면 내 ${closest.totcnt}개 구역 조회</div>`:''}
        `).openOn(map);
    }catch(err){
      console.warn('CPTED 정보 조회 실패',err);
      L.popup({className:'safepopup',closeButton:true,maxWidth:260,closeOnClick:true})
        .setLatLng(latlng)
        .setContent(`
          <div class="pbadge" style="background:#b4530918;color:#b45309">🏗 범죄예방환경설계</div>
          <div class="ptitle">CPTED 정보 조회 실패</div>
          <div class="prow">공공데이터 서버 응답이 없거나 일시적으로 차단되었습니다.</div>
        `).openOn(map);
    }finally{
      if(spinner) spinner.classList.remove('show');
    }
  }

  map.on('click', e=>{
    if(routePickMode){
      clearCptedGuide(true);
      routePickMode=false;
      document.body.classList.remove('map-pick-mode');
      setDestinationAndRoute(e.latlng);
      return;
    }
    handleCptedTap(e.latlng);
  });

  // 모바일 보강: Leaflet click 변환이 실패해도 pointerup으로 직접 좌표를 계산해 CPTED 조회
  const mapEl=map.getContainer();
  let pointerStart=null;

  const onPointerDown=e=>{
    if(e.pointerType==='mouse') return;
    pointerStart={x:e.clientX,y:e.clientY,t:Date.now()};
  };

  const onPointerUp=e=>{
    if(e.pointerType==='mouse'||!pointerStart) return;

    const dx=e.clientX-pointerStart.x;
    const dy=e.clientY-pointerStart.y;
    const dt=Date.now()-pointerStart.t;
    pointerStart=null;

    // 지도 이동/드래그는 터치로 처리하지 않음
    if(Math.sqrt(dx*dx+dy*dy)>12||dt>900) return;

    const rect=mapEl.getBoundingClientRect();
    const pt=L.point(e.clientX-rect.left,e.clientY-rect.top);
    const tappedLatLng=map.containerPointToLatLng(pt);

    if(routePickMode){
      clearCptedGuide(true);
      routePickMode=false;
      document.body.classList.remove('map-pick-mode');
      setDestinationAndRoute(tappedLatLng);
      return;
    }

    handleCptedTap(tappedLatLng);
  };

  mapEl.addEventListener('pointerdown',onPointerDown,{passive:true});
  mapEl.addEventListener('pointerup',onPointerUp,{passive:true});
  mapDomCleanups.push(()=>{
    mapEl.removeEventListener('pointerdown',onPointerDown);
    mapEl.removeEventListener('pointerup',onPointerUp);
  });
}

  getTileUrl: function(coords){

    const bbox = [b.getWest(),b.getSouth(),b.getEast(),b.getNorth()].join(',');
    return this._url
      + '?serviceKey=' + API_KEY
      + '&srs=EPSG:4326'
      + '&bbox=' + bbox
      + '&format=image/png&width=256&height=256&transparent=TRUE';
  }
});

const SafemapWMS3857 = L.TileLayer.extend({
  getTileUrl: function(coords){
    const b = this._tileCoordsToBounds(coords);
    const bbox = [b.getWest(),b.getSouth(),b.getEast(),b.getNorth()].join(',');
    return this._url
      + '?serviceKey=' + API_KEY
      + '&layers=A2SM_CCTV_INFO'
      + '&styles='
      + '&srs=EPSG:3857'
      + '&bbox=' + bbox

/* ── XML 데이터 ── */
function ensureMarkerLayer(key){
  if(!markerCache[key]){
    const group=L.layerGroup();
    markerCache[key]={group,items:new Map()};
    layers[key]=group;
  }

  if(!layers[key]) layers[key]=markerCache[key].group;

  if(map && chipOn[key] && !map.hasLayer(layers[key])){
    layers[key].addTo(map);
  }

  return markerCache[key];
}

function isMarkerLayerCacheFresh(key,currentBounds){
  if(!map || !markerCache[key]) return false;
  const b=markerFetchBounds[key];
  if(!b) return false;
  if(markerFetchZoom[key]!==map.getZoom()) return false;
  return b.contains(currentBounds);
}

function parseLayerPoint(it){
  let lat=parseFloat(it.lat||0);
  let lng=parseFloat(it.lon||0);

  if(!lat||!lng){
    const px=parseFloat(it.x||0);
    const py=parseFloat(it.y||0);
    if(px&&py){
      const pt=L.CRS.EPSG3857.unproject(L.point(px,py));
      lat=pt.lat;
      lng=pt.lng;
    }
  }

  if(!lat||!lng||isNaN(lat)||isNaN(lng)) return null;
  return {lat,lng};
}

function getMarkerStableId(key,lat,lng,it){
  const info=getFacilityInfo(key,it);
  const name=(info.name||'').replace(/\s+/g,' ').trim();
  const addr=(info.addr||'').replace(/\s+/g,' ').trim();
  return [key,lat.toFixed(6),lng.toFixed(6),name,addr].join('|');
}

function countVisibleMarkers(key){
  if(!map || !markerCache[key]) return 0;
  const b=map.getBounds();
  let cnt=0;
  markerCache[key].items.forEach(rec=>{
    if(b.contains([rec.lat,rec.lng])) cnt++;
  });
  return cnt;
}

function refreshCachedFacilityState(){
  if(!map || !grp) return;

  const nearBounds=map.getBounds().pad(0.45);
  safeFacilityPoints=[];
  safeFacilitySeen=new Set();

  GROUP[grp].xml.forEach(key=>{
    const cache=markerCache[key];
    counts[key]=cache?countVisibleMarkers(key):0;
    if(!cache) return;

    cache.items.forEach(rec=>{
      if(nearBounds.contains([rec.lat,rec.lng])){
        registerSafeFacility(rec.key,rec.lat,rec.lng,rec.raw);
      }
    });
  });
}

function pruneMarkerCache(key,keepIds,requestBounds){
  const cache=markerCache[key];
  if(!cache) return;

  const pruneBounds=requestBounds.pad(MARKER_PRUNE_PADDING);
  cache.items.forEach((rec,id)=>{
    if(keepIds.has(id)) return;

    // 현재 받아온 넓은 범위 밖으로 완전히 나간 마커만 제거함.
    // 화면 안쪽 마커를 즉시 지우지 않기 때문에 아이콘 깜빡임이 크게 줄어듦.
    if(!pruneBounds.contains([rec.lat,rec.lng])){
      cache.group.removeLayer(rec.marker);
      cache.items.delete(id);
    }
  });
}

/* 마커를 프레임 단위로 나눠 추가 — CCTV처럼 수백 개를 한 번에 그릴 때 생기는 화면 멈춤을 방지함.
   한 프레임에 chunk개씩만 그리고 다음 프레임으로 넘김. 토글·지도 조작이 즉시 반응하게 됨. */
function addMarkersProgressively(group,markers,chunk=40){
  let i=0;
  function step(){
    if(!group) return;
    const end=Math.min(i+chunk,markers.length);
    for(;i<end;i++) group.addLayer(markers[i]);
    if(i<markers.length) requestAnimationFrame(step);
  }
  step();
}

async function fetchAll(silent=false, force=false){
  const token=++fetchRunToken;
  const keys=GROUP[grp].xml;

  keys.forEach(ensureMarkerLayer);

  // 현재 화면이 이미 캐시된 요청 범위 안에 있으면 API 재호출 없이 기존 마커를 그대로 씀.
  if(!force && keys.length && keys.every(k=>isMarkerLayerCacheFresh(k,map.getBounds()))){
    refreshCachedFacilityState();
    updateStats();
    return;
  }

  const spinner=document.getElementById('map-spinner');
  if(spinner && !silent) spinner.classList.add('show');

  try{
    await Promise.allSettled(keys.map(k=>fetchLayer(k, token, force)));
    if(token===fetchRunToken){
      refreshCachedFacilityState();
      updateStats();
    }
  }catch(e){
    console.warn('fetchAll 오류:',e);
  }finally{
    if(spinner) spinner.classList.remove('show');
  }
}

async function fetchLayer(key, token=null, force=false){
  const cfg=LAYER_API[key];
  if(!cfg){
    console.warn('['+key+'] LAYER_API 없음');
    return;
  }

  ensureMarkerLayer(key);

  const currentBounds=map.getBounds();
  if(!force && isMarkerLayerCacheFresh(key,currentBounds)){
    counts[key]=countVisibleMarkers(key);
    return;
  }

  const requestBounds=currentBounds.pad(MARKER_FETCH_PADDING);

  const area4326=[
    requestBounds.getNorth(),requestBounds.getSouth(),
    requestBounds.getWest(),requestBounds.getEast()
  ].join(',');

  const nw=L.CRS.EPSG3857.project(requestBounds.getNorthWest());
  const se=L.CRS.EPSG3857.project(requestBounds.getSouthEast());
  const area3857=[nw.y,se.y,nw.x,se.x].join(',');

  const params=new URLSearchParams({
    layerName:cfg.layer,
    style:cfg.style,
    area4326,
    area3857,
    currentPage:'1',
    perPage:'500'
  });

  try{
    const ctrl=new AbortController();
    const abortTimer=setTimeout(()=>ctrl.abort(),10000);

    const res=await fetch(MARKER_API,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:params,
      signal:ctrl.signal
    });
    clearTimeout(abortTimer);

    const data=await res.json();
    const items=data.resultList||[];

    if(token!==null && token!==fetchRunToken){
      console.log('['+key+'] 오래된 요청 응답 무시');
      return;
    }

    const cache=ensureMarkerLayer(key);
    const keepIds=new Set();
    let added=0;

    const toAdd=[];
    items.forEach(it=>{
      const p=parseLayerPoint(it);
      if(!p) return;

      const id=getMarkerStableId(key,p.lat,p.lng,it);
      keepIds.add(id);

      if(!cache.items.has(id)){
        const marker=mkMarker(key,p.lat,p.lng,it);
        cache.items.set(id,{id,key,lat:p.lat,lng:p.lng,raw:it,marker});
        toAdd.push(marker);
        added++;
      }else{
        const rec=cache.items.get(id);
        rec.raw=it;
      }
    });

    // 신규 마커 추가: CCTV처럼 수가 많으면 한 프레임에 다 그리지 않고 프레임 단위로 나눠 추가해
    // 메인 스레드 블로킹(토글·스크롤 버벅임)을 막음. 다른 레이어는 기존처럼 한 번에 추가함.
    if(toAdd.length){
      if(key==='cctv' && toAdd.length>60){
        addMarkersProgressively(cache.group,toAdd);
      }else{
        toAdd.forEach(m=>cache.group.addLayer(m));
      }
    }

    pruneMarkerCache(key,keepIds,requestBounds);

    markerFetchBounds[key]=requestBounds;
    markerFetchZoom[key]=map.getZoom();
    counts[key]=countVisibleMarkers(key);

    if(chipOn[key] && map && layers[key] && !map.hasLayer(layers[key])){
      layers[key].addTo(map);
    }

    console.log('['+key+'] 캐시갱신: 표시권역 '+counts[key]+'개, 신규 '+added+'개, 캐시 '+cache.items.size+'개');
  }catch(e){
    console.warn('['+key+'] 실패:',e.message);
  }
}

function xv(it,tag){
  return it&&it[tag]!=null?String(it[tag]).trim():'';
}

function near(lat,lng){
  const R=6371;
  const dl=(myLat-lat)*Math.PI/180;
  const dg=(myLng-lng)*Math.PI/180;
  const a=Math.sin(dl/2)**2+Math.cos(lat*Math.PI/180)*Math.cos(myLat*Math.PI/180)*Math.sin(dg/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))<=R_KM;
}

/* ── 안전 우선 실제 도보 길찾기 ── */
const FACILITY_WEIGHT={
  police:120,
  child_house:105,
  bell:75,
  cctv:38
};

const FACILITY_ROUTE_LABEL={
  police:'🚔 치안시설',
  child_house:'🏠 아동안전지킴이집',
  bell:'🔔 안전비상벨',
  cctv:'📷 CCTV'
};

function registerSafeFacility(key,lat,lng,it){
  if(!['police','child_house','bell','cctv'].includes(key)) return;
  const id=key+':'+lat.toFixed(6)+','+lng.toFixed(6);
  if(safeFacilitySeen.has(id)) return;
  safeFacilitySeen.add(id);
  const info=getFacilityInfo(key,it);
  safeFacilityPoints.push({
    id,key,lat,lng,
    name:info.name||LAYER[key]?.label||key,
    addr:info.addr||'',
    weight:FACILITY_WEIGHT[key]||30
  });
}

function getFacilityInfo(key,it){
  let name='',addr='';
  if(key==='bell'){
    name=xv(it,'ins_detail')||xv(it,'rn_adres')||'안전비상벨';
    addr=xv(it,'rn_adres')||xv(it,'adres')||'';
  }else if(key==='police'){
    name=xv(it,'fclty_nm')||'치안시설';
    addr=xv(it,'rn_adres')||xv(it,'adres')||'';
  }else if(key==='cctv'){
    name=xv(it,'TITLE')||xv(it,'title')||'CCTV';
    addr=xv(it,'lctn_rona_addr')||xv(it,'lctn_lotno_addr')||'';
  }else if(key==='child_house'){
    name=xv(it,'fclty_nm')||'아동안전지킴이집';
    addr=xv(it,'rn_adres')||xv(it,'adres')||'';
  }
  return {name,addr};
}

function startRoutePick(){
  if(grp === 'cpted'){
    showRouteToast('CPTED 화면에서는 지도에서 지점을 찍으면 가장 가까운 CPTED 구역까지 직선으로 안내합니다.');
    return;
  }

  cptedTapRequestToken++;
  clearCptedGuide(true);
  if(!map){
    showRouteToast('지도가 아직 준비되지 않았습니다.');
    return;
  }
  if(!myLat||!myLng){
    showRouteToast('현재 위치 확인 후 길찾기를 사용할 수 있습니다.');
    return;
  }
  routePickMode=true;
  document.body.classList.add('map-pick-mode');
  showRouteToast('🧭 목적지를 지도에서 한 번 터치하세요. 실제 지도 도로망을 따라 빨간색 경로를 표시합니다.');
}

async function setDestinationAndRoute(latlng){
  if(grp === 'cpted') return;
  if(!map||!myLat||!myLng) return;
  clearRoute(false);

  destinationMark=L.marker([latlng.lat,latlng.lng],{zIndexOffset:900}).addTo(map)
    .bindPopup(L.popup({className:'safepopup',closeButton:true,maxWidth:240}).setContent(`
      <div class="pbadge" style="background:#2563eb18;color:#2563eb">🎯 목적지</div>
      <div class="ptitle">선택한 목적지</div>
      <div class="prow">실제 지도 도로망 기반의 빨간색 도보 경로를 계산합니다.</div>
    `));

  const spinner=document.getElementById('map-spinner');
  if(spinner) spinner.classList.add('show');
  showRoutePanelLoading(latlng);

  try{
    const waypoints=selectSafeWaypoints({lat:latlng.lat,lng:latlng.lng});
    drawWaypointMarks(waypoints);

    const locations=[
      {lat:myLat,lon:myLng},
      ...waypoints.map(p=>({lat:p.lat,lon:p.lng})),
      {lat:latlng.lat,lon:latlng.lng}
    ];

    const routeData=await requestWalkingRoute(locations);
    const routeLatLngs=drawApiRoute(routeData);
    await fetchAll(true); // 경로가 화면에 맞춰진 뒤, 경로 주변 시설 데이터로 다시 계산
    const summary=getRouteSummary(routeData,routeLatLngs);
    const safety=evaluateRouteSafety(routeLatLngs,waypoints);
    updateRoutePanel(summary,safety,waypoints,false);
    showRouteToast('✅ 실제 지도 도로망 기반 경로 계산 완료. 빨간색 경로로 표시했습니다.');
  }catch(err){
    console.warn('실제 경로 API 실패:',err);
    const waypoints=selectSafeWaypoints({lat:latlng.lat,lng:latlng.lng});
    drawWaypointMarks(waypoints);
    const points=[[myLat,myLng],...waypoints.map(p=>[p.lat,p.lng]),[latlng.lat,latlng.lng]];
    fallbackRouteLine=L.polyline(points,{color:ROUTE_COLOR,weight:5,opacity:.85,dashArray:'8,8',lineCap:'round',lineJoin:'round'}).addTo(map);
    map.fitBounds(fallbackRouteLine.getBounds(),{padding:[50,50]});
    const fallbackLatLngs=points.map(p=>({lat:p[0],lng:p[1]}));
    await fetchAll(true); // 임시 경로도 현재 경로 화면 기준 시설 수로 다시 계산
    const summary={distanceM:pathDistanceMeters(fallbackLatLngs),durationSec:pathDistanceMeters(fallbackLatLngs)/1.1};
    const safety=evaluateRouteSafety(fallbackLatLngs,waypoints);
    updateRoutePanel(summary,safety,waypoints,true);
    showRouteToast('⚠️ 도로망 경로 API 호출에 실패해 임시 경유지 선을 빨간색 점선으로 표시했습니다.');
  }finally{
    if(spinner) spinner.classList.remove('show');
  }
}

function selectSafeWaypoints(dest){
  const direct=distM(myLat,myLng,dest.lat,dest.lng);
  if(!safeFacilityPoints.length||direct<120) return [];

  const candidates=safeFacilityPoints.map(p=>{
    const d1=distM(myLat,myLng,p.lat,p.lng);
    const d2=distM(p.lat,p.lng,dest.lat,dest.lng);
    const detour=(d1+d2)-direct;
    const ratio=(d1+d2)/Math.max(direct,1);
    const lineD=distancePointToSegmentMeters(p,{lat:myLat,lng:myLng},dest);
    const density=densityBonus(p);
    let groupBonus=0;
    if(grp==='child'&&p.key==='child_house') groupBonus+=45;
    if(grp==='child'&&p.key==='police') groupBonus+=20;
    if(grp==='youth'&&p.key==='police') groupBonus+=28;
    if(grp==='youth'&&p.key==='cctv') groupBonus+=10;
    if(grp==='elder'&&p.key==='bell') groupBonus+=28;
    if(grp==='elder'&&p.key==='police') groupBonus+=18;

    const score=p.weight+groupBonus+density-(detour/18)-(lineD/16);
    return {...p,d1,d2,detour,ratio,lineD,score};
  }).filter(p=>{
    if(p.d1<45) return false;
    if(p.d2<45) return false;
    if(p.ratio>1.45) return false;
    if(p.lineD>Math.max(250,direct*.45)) return false;
    return true;
  }).sort((a,b)=>b.score-a.score);

  const selected=[];
  const maxCount=direct>900?2:1;
  for(const c of candidates){
    if(selected.length>=maxCount) break;
    if(selected.some(s=>distM(s.lat,s.lng,c.lat,c.lng)<180)) continue;
    selected.push(c);
  }

  selected.sort((a,b)=>a.d1-b.d1);
  return selected;
}

function densityBonus(p){
  let bonus=0;
  for(const q of safeFacilityPoints){
    const d=distM(p.lat,p.lng,q.lat,q.lng);
    if(d<=150){
      bonus+=(FACILITY_WEIGHT[q.key]||30)*0.14;
    }
  }
  return Math.min(80,bonus);
}

async function requestWalkingRoute(locations){
  // Cloudflare Worker를 쓰려면 ROUTE_PROXY_URL에 Worker 주소를 넣고, Worker가 동일한 body를 Valhalla/ORS/카카오로 전달하게 하면 됨.
  if(ROUTE_PROXY_URL){
    const res=await fetch(ROUTE_PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({locations,costing:'pedestrian'})
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'프록시 경로 요청 실패');
    return data;
  }

  let lastErr=null;

  // 1순위: 실제 OSM 도로망 기반 OSRM 도보 경로
  for(const baseUrl of OSRM_FOOT_ROUTE_URLS){
    try{
      const coords=locations.map(p=>`${p.lon},${p.lat}`).join(';');
      const params=new URLSearchParams({
        overview:'full',
        geometries:'geojson',
        steps:'true',
        alternatives:'false'
      });
      const res=await fetch(`${baseUrl}/${coords}?${params.toString()}`);
      const data=await res.json();
      if(!res.ok || data.code !== 'Ok'){
        throw new Error(data.message||data.code||('HTTP '+res.status));
      }
      data._routeProvider='OSRM-foot';
      return data;
    }catch(e){
      lastErr=e;
      console.warn('OSRM 도보 경로 실패:',e);
    }
  }

  // 2순위: 기존 Valhalla 공개 라우팅 서버
  const body={
    locations,
    costing:'pedestrian',
    directions_options:{units:'kilometers',language:'ko-KR'},
    format:'osrm',
    shape_format:'geojson'
  };

  for(const url of VALHALLA_ROUTE_URLS){
    try{
      const res=await fetch(url,{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'X-Client-Id':'safewalk-pohang-school-project'
        },
        body:JSON.stringify(body)
      });
      const data=await res.json();
      if(!res.ok) throw new Error(data.message||data.error||('HTTP '+res.status));
      data._routeProvider='Valhalla';
      return data;
    }catch(e){
      lastErr=e;
      console.warn('Valhalla 도보 경로 실패:',e);
    }
  }

  throw lastErr||new Error('실제 도로망 경로 요청 실패');
}

function drawApiRoute(data){
  if(apiRouteLayer) map.removeLayer(apiRouteLayer);

  let geometry=null;
  if(data.routes&&data.routes[0]&&data.routes[0].geometry){
    geometry=data.routes[0].geometry;
  }else if(data.trip&&data.trip.legs){
    // Valhalla 기본 형식으로 응답될 경우를 대비한 예비 처리
    const coords=[];
    data.trip.legs.forEach(leg=>{
      if(leg.shape&&Array.isArray(leg.shape.coordinates)) coords.push(...leg.shape.coordinates);
    });
    geometry={type:'LineString',coordinates:coords};
  }

  if(!geometry) throw new Error('경로 geometry 없음');

  const halo=L.geoJSON(geometry,{
    style:{color:ROUTE_HALO_COLOR,weight:10,opacity:.9,lineCap:'round',lineJoin:'round'}
  });
  const redLine=L.geoJSON(geometry,{
    style:{color:ROUTE_COLOR,weight:6,opacity:.96,lineCap:'round',lineJoin:'round'}
  });

  apiRouteLayer=L.featureGroup([halo,redLine]).addTo(map);
  map.fitBounds(apiRouteLayer.getBounds(),{padding:[56,56]});
  return geoJsonToLatLngs(geometry);
}

function geoJsonToLatLngs(geometry){
  if(!geometry) return [];
  if(geometry.type==='LineString'){
    return geometry.coordinates.map(c=>({lat:c[1],lng:c[0]}));
  }
  if(geometry.type==='MultiLineString'){
    return geometry.coordinates.flat().map(c=>({lat:c[1],lng:c[0]}));
  }
  return [];
}

function getRouteSummary(data,latLngs){
  const r=data.routes&&data.routes[0]?data.routes[0]:null;
  let distanceM=r&&Number.isFinite(r.distance)?r.distance:pathDistanceMeters(latLngs);
  let durationSec=r&&Number.isFinite(r.duration)?r.duration:distanceM/1.1;

  // 일부 Valhalla 응답은 km 단위로 올 수 있어 보정
  if(distanceM>0&&distanceM<100&&pathDistanceMeters(latLngs)>500){
    distanceM=distanceM*1000;
  }
  return {distanceM,durationSec,provider:data._routeProvider||'routing'};
}

function drawWaypointMarks(waypoints){
  waypointMarks.forEach(m=>map.removeLayer(m));
  waypointMarks=[];
  waypoints.forEach((p,i)=>{
    const icon=L.divIcon({
      html:`<div class="waypoint-label">${i+1}. ${FACILITY_ROUTE_LABEL[p.key]||'안전시설'}</div>`,
      className:'',
      iconSize:null,
      iconAnchor:[20,18]
    });
    const mark=L.marker([p.lat,p.lng],{icon,zIndexOffset:850}).addTo(map)
      .bindPopup(L.popup({className:'safepopup',closeButton:true,maxWidth:260}).setContent(`
        <div class="pbadge" style="background:#05966918;color:#059669">${FACILITY_ROUTE_LABEL[p.key]||'안전시설'} 경유지</div>
        <div class="ptitle">${p.name}</div>
        ${p.addr?`<div class="prow">📍 ${p.addr}</div>`:''}
        <div class="prow">안전 우선순위 점수 ${Math.round(p.score||0)}점</div>
      `));
    waypointMarks.push(mark);
  });
}

function evaluateRouteSafety(routeLatLngs,waypoints){
  const countsByKey={police:0,child_house:0,bell:0,cctv:0};
  const seen=new Set();
  let weighted=0;

  // 패널 숫자는 화면 전체 시설 수가 아니라 빨간 경로 주변 ROUTE_FACILITY_RADIUS_M m 안에 들어오는 시설만 계산함.
  for(const p of safeFacilityPoints){
    const nearRoute=minDistanceToPathMeters(p,routeLatLngs)<=ROUTE_FACILITY_RADIUS_M;
    if(!nearRoute) continue;
    if(seen.has(p.id)) continue;
    seen.add(p.id);
    countsByKey[p.key]=(countsByKey[p.key]||0)+1;
    weighted+=(FACILITY_WEIGHT[p.key]||30);
  }

  // 안전 경유지로 직접 선택된 시설도 실제 경로 주변에 있으면 누락 없이 반영함.
  waypoints.forEach(w=>{
    const nearRoute=minDistanceToPathMeters(w,routeLatLngs)<=ROUTE_FACILITY_RADIUS_M;
    if(!nearRoute||seen.has(w.id)) return;
    seen.add(w.id);
    countsByKey[w.key]=(countsByKey[w.key]||0)+1;
    weighted+=(FACILITY_WEIGHT[w.key]||30)+40;
  });

  const routeKm=Math.max(pathDistanceMeters(routeLatLngs)/1000,.2);
  const densityScore=Math.min(45,weighted/(routeKm*18));
  const waypointScore=Math.min(20,waypoints.length*10);
  const score=Math.max(35,Math.min(100,Math.round(45+densityScore+waypointScore)));
  return {countsByKey,score,total:seen.size,radiusM:ROUTE_FACILITY_RADIUS_M};
}

function updateRoutePanel(summary,safety,waypoints,isFallback){
  const panel=document.getElementById('routePanel');
  const title=document.getElementById('routeTitle');
  const sub=document.getElementById('routeSub');
  const dist=document.getElementById('routeDistance');
  const dur=document.getElementById('routeDuration');
  const score=document.getElementById('routeScore');
  const list=document.getElementById('routeSafeList');
  const reason=document.getElementById('routeReason');

  if(!panel) return;
  panel.classList.add('show');
  updateRoutePanelPosition();
  title.textContent=isFallback?'⚠️ 임시 안전 경유 경로':'🧭 실제 지도 기반 빨간색 경로';
  sub.textContent=isFallback?'도로망 API 실패로 안전 경유지 기준 임시 빨간 점선을 표시했습니다.':'실제 보행 가능한 지도 도로망을 따라 경로를 표시했습니다.';
  dist.textContent=formatDistance(summary.distanceM);
  dur.textContent=formatDuration(summary.durationSec);
  score.textContent=safety.score+'점';

  const chips=[];
  ['police','child_house','bell','cctv'].forEach(k=>{
    const n=safety.countsByKey[k]||0;
    chips.push(`<span class="route-pill">${FACILITY_ROUTE_LABEL[k]} ${n}개</span>`);
  });
  list.innerHTML=chips.join('');

  if(waypoints.length){
    const names=waypoints.map(w=>`${FACILITY_ROUTE_LABEL[w.key]||'안전시설'}(${w.name})`).join(' → ');
    reason.innerHTML=`우선 경유지: ${names}<br>위 숫자는 전체 표시 시설이 아니라 빨간 경로 주변 ${safety.radiusM}m 이내 시설만 계산한 값입니다.`;
  }else{
    reason.innerHTML=`현재 화면 주변에서 적절한 안전 경유지를 찾지 못해 목적지까지의 실제 도보 경로를 우선 표시했습니다.<br>위 숫자는 전체 표시 시설이 아니라 빨간 경로 주변 ${safety.radiusM}m 이내 시설만 계산한 값입니다.`;
  }
}

  updateRoutePanelPosition();
  document.getElementById('routeTitle').textContent='🧭 실제 지도 경로 계산 중';

  document.getElementById('routeDistance').textContent='계산 중';

function clearRoute(hidePanel=true){
  routePickMode=false;
  document.body.classList.remove('map-pick-mode');
  if(destinationMark&&map) map.removeLayer(destinationMark);
  if(apiRouteLayer&&map) map.removeLayer(apiRouteLayer);
  if(fallbackRouteLine&&map) map.removeLayer(fallbackRouteLine);
  waypointMarks.forEach(m=>{if(map) map.removeLayer(m);});
  destinationMark=null;
  apiRouteLayer=null;
  fallbackRouteLine=null;
  waypointMarks=[];
  if(hidePanel){
    const panel=document.getElementById('routePanel');
    if(panel){
      panel.classList.remove('show');
      updateRoutePanelPosition();
    }
  }
}

function showRouteToast(msg){
  const t=document.getElementById('routeToast');
  if(!t){alert(msg);return;}
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),3800);
}

function formatDistance(m){
  if(!Number.isFinite(m)) return '-';
  return m>=1000?(m/1000).toFixed(1)+'km':Math.round(m)+'m';
}

function formatDuration(sec){
  if(!Number.isFinite(sec)) return '-';
  const min=Math.max(1,Math.round(sec/60));
  return '약 '+min+'분';
}

function distM(lat1,lng1,lat2,lng2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function pathDistanceMeters(points){
  let sum=0;
  for(let i=1;i<points.length;i++) sum+=distM(points[i-1].lat,points[i-1].lng,points[i].lat,points[i].lng);
  return sum;
}

function toXY(p,ref){
  const R=6371000;
  const lat0=ref.lat*Math.PI/180;
  return {
    x:(p.lng-ref.lng)*Math.PI/180*R*Math.cos(lat0),
    y:(p.lat-ref.lat)*Math.PI/180*R
  };
}

function distancePointToSegmentMeters(p,a,b){
  const pp=toXY(p,a);
  const aa={x:0,y:0};
  const bb=toXY(b,a);
  const dx=bb.x-aa.x;
  const dy=bb.y-aa.y;
  const len2=dx*dx+dy*dy;
  if(len2===0) return Math.sqrt(pp.x*pp.x+pp.y*pp.y);
  let t=((pp.x-aa.x)*dx+(pp.y-aa.y)*dy)/len2;
  t=Math.max(0,Math.min(1,t));
  const x=aa.x+t*dx;
  const y=aa.y+t*dy;
  return Math.sqrt((pp.x-x)**2+(pp.y-y)**2);
}

function minDistanceToPathMeters(p,path){
  if(!path||path.length===0) return Infinity;
  if(path.length===1) return distM(p.lat,p.lng,path[0].lat,path[0].lng);
  let min=Infinity;
  for(let i=1;i<path.length;i++){
    const d=distancePointToSegmentMeters(p,path[i-1],path[i]);
    if(d<min) min=d;
  }
  return min;
}

function updateStats(){
  const bar=document.getElementById('statsBar');
  if(!bar || !grp) return;

  const g=GROUP[grp];
  const items=[];

  g.xml.forEach(key=>{
    const m=LAYER[key];
    if(!m) return;
    const cnt=counts[key]||0;
    items.push(`<div class="stat-item">
      <span class="stat-emoji">${m.emoji}</span>
      <div class="stat-info">
        <span class="stat-num" style="color:${m.color}">${cnt}</span>
        <span class="stat-lbl">${m.label}</span>
      </div>
    </div>`);
  });

  bar.style.display=items.length?'flex':'none';
  bar.innerHTML=items.join('');
}
